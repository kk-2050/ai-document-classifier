<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AI Document Classifier</title>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@300;400;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0d0d;
      --surface: #161616;
      --border: #2a2a2a;
      --accent: #00e5a0;
      --accent-dim: rgba(0,229,160,0.12);
      --text: #e8e8e8;
      --text-muted: #aaa;
      --mono: 'IBM Plex Mono', monospace;
      --sans: 'IBM Plex Sans', sans-serif;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 48px 24px;
    }

    header {
      width: 100%;
      max-width: 720px;
      margin-bottom: 48px;
    }

    .label {
      font-family: var(--mono);
      font-size: 11px;
      letter-spacing: 0.15em;
      color: var(--accent);
      text-transform: uppercase;
      margin-bottom: 12px;
    }

    h1 {
      font-family: var(--mono);
      font-size: clamp(24px, 4vw, 36px);
      font-weight: 600;
      line-height: 1.2;
      color: var(--text);
    }

    h1 span {
      color: var(--accent);
    }

    .subtitle {
      margin-top: 12px;
      font-size: 14px;
      color: var(--text-muted);
      line-height: 1.6;
      font-weight: 300;
    }

    .card {
      width: 100%;
      max-width: 720px;
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 32px;
      margin-bottom: 24px;
    }

    .field-label {
      font-family: var(--mono);
      font-size: 11px;
      letter-spacing: 0.12em;
      color: var(--text-muted);
      text-transform: uppercase;
      margin-bottom: 10px;
      display: block;
    }

    input[type="text"] {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: var(--mono);
      font-size: 13px;
      padding: 12px 16px;
      outline: none;
      transition: border-color 0.2s;
      margin-bottom: 24px;
    }

    input[type="text"]:focus {
      border-color: var(--accent);
    }

    textarea {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: var(--sans);
      font-size: 14px;
      line-height: 1.7;
      padding: 16px;
      outline: none;
      resize: vertical;
      min-height: 200px;
      transition: border-color 0.2s;
      font-weight: 300;
    }

    textarea:focus {
      border-color: var(--accent);
    }

    .samples {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 12px;
    }

    .sample-btn {
      font-family: var(--mono);
      font-size: 11px;
      padding: 6px 12px;
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-muted);
      cursor: pointer;
      transition: all 0.2s;
      letter-spacing: 0.05em;
    }

    .sample-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    button.submit {
      width: 100%;
      max-width: 720px;
      padding: 16px;
      background: var(--accent);
      color: #000;
      font-family: var(--mono);
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      border: none;
      cursor: pointer;
      transition: opacity 0.2s;
      margin-bottom: 32px;
    }

    button.submit:hover { opacity: 0.85; }
    button.submit:disabled { opacity: 0.4; cursor: not-allowed; }

    .result-card {
      width: 100%;
      max-width: 720px;
      border: 1px solid var(--accent);
      background: var(--accent-dim);
      padding: 32px;
      display: none;
      animation: fadeIn 0.4s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .result-header {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 28px;
    }

    .category-badge {
      font-family: var(--mono);
      font-size: 20px;
      font-weight: 600;
      color: var(--accent);
    }

    .confidence-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--accent);
      display: inline-block;
      margin-right: 6px;
    }

    .confidence-text {
      font-family: var(--mono);
      font-size: 12px;
      color: var(--text-muted);
    }

    .result-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
    }

    @media (max-width: 500px) {
      .result-grid { grid-template-columns: 1fr; }
    }

    .result-field { }

    .result-field .field-label {
      margin-bottom: 6px;
    }

    .result-field .value {
      font-size: 14px;
      line-height: 1.6;
      color: var(--text);
      font-weight: 300;
    }

    .result-field.full { grid-column: 1 / -1; }

    .entities {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 4px;
    }

    .entity-tag {
      font-family: var(--mono);
      font-size: 12px;
      padding: 4px 10px;
      border: 1px solid var(--border);
      color: var(--accent);
      background: transparent;
    }

    .error-card {
      width: 100%;
      max-width: 720px;
      border: 1px solid #ff4444;
      background: rgba(255,68,68,0.08);
      padding: 20px 24px;
      display: none;
      font-family: var(--mono);
      font-size: 13px;
      color: #ff6666;
      margin-bottom: 24px;
    }

    .loading {
      display: none;
      width: 100%;
      max-width: 720px;
      padding: 24px;
      text-align: center;
      font-family: var(--mono);
      font-size: 12px;
      color: var(--text-muted);
      letter-spacing: 0.1em;
    }

    .spinner {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-right: 10px;
      vertical-align: middle;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    footer {
      margin-top: 48px;
      font-family: var(--mono);
      font-size: 11px;
      color: var(--text-muted);
      letter-spacing: 0.08em;
    }

    footer a {
      color: var(--accent);
      text-decoration: none;
    }
  </style>
</head>
<body>

  <header>
    <div class="label">Portfolio Project</div>
    <h1>AI Document <span>Classifier</span></h1>
    <p class="subtitle">Paste any document text below. The AI will classify it, summarize it, and extract key information — powered by n8n + OpenAI GPT-4o-mini.</p>
  </header>

  <div class="card">
    <label class="field-label" for="filename">Filename (optional)</label>
    <input type="text" id="filename" placeholder="e.g. contract_2026.txt" />

    <label class="field-label" for="doctext">Document Text</label>
    <textarea id="doctext" placeholder="Paste your document text here..."></textarea>

    <div class="samples">
      <span style="font-family:var(--mono);font-size:11px;color:var(--text-muted);align-self:center;">Try sample:</span>
      <button class="sample-btn" onclick="loadSample('invoice')">Invoice</button>
      <button class="sample-btn" onclick="loadSample('resume')">Resume</button>
      <button class="sample-btn" onclick="loadSample('contract')">Contract</button>
      <button class="sample-btn" onclick="loadSample('email')">Email</button>
    </div>
  </div>

  <button class="submit" id="submitBtn" onclick="classify()">
    Analyze Document →
  </button>

  <div class="loading" id="loading">
    <span class="spinner"></span> Analyzing with AI...
  </div>

  <div class="error-card" id="errorCard"></div>

  <div class="result-card" id="resultCard">
    <div class="result-header">
      <div class="category-badge" id="rCategory">—</div>
      <div>
        <span class="confidence-dot"></span>
        <span class="confidence-text" id="rConfidence">—</span>
      </div>
    </div>
    <div class="result-grid">
      <div class="result-field full">
        <span class="field-label">Summary</span>
        <div class="value" id="rSummary">—</div>
      </div>
      <div class="result-field">
        <span class="field-label">Key Entities</span>
        <div class="entities" id="rEntities"></div>
      </div>
      <div class="result-field">
        <span class="field-label">Processed At</span>
        <div class="value" id="rProcessed">—</div>
      </div>
    </div>
  </div>

  <footer>
    Built by <a href="https://github.com/kk-2050" target="_blank">Kaori Kashiwagi</a> &nbsp;·&nbsp;
    <a href="https://github.com/kk-2050/ai-document-classifier" target="_blank">View on GitHub</a>
  </footer>

  <script>
    const WEBHOOK_URL = "https://kssweets8.app.n8n.cloud/webhook/doc-classify";

    const samples = {
      invoice: {
        filename: "invoice_april.txt",
        text: "INVOICE #2026-0042\nFrom: ABC Supplies Inc.\nTo: XYZ Corporation\nDate: April 15, 2026\nAmount Due: $3,450.00\nDue Date: May 15, 2026\nItems: Office supplies x 10, Printer paper x 5 cases, Desk chair x 2"
      },
      resume: {
        filename: "resume_john.txt",
        text: "John Smith | john.smith@email.com | LinkedIn: linkedin.com/in/johnsmith\n\nSUMMARY\nExperienced Software Engineer with 8 years in backend development.\n\nEXPERIENCE\nSenior Engineer, Tech Corp (2020-2024)\n- Built REST APIs serving 1M+ users\n- Led team of 5 engineers\n\nEDUCATION\nB.S. Computer Science, State University, 2016\n\nSKILLS\nPython, Java, SQL, AWS, Docker"
      },
      contract: {
        filename: "contract_service.txt",
        text: "SERVICE AGREEMENT\nThis Agreement is entered into as of January 1, 2026, between Acme Corp (Client) and TechServices LLC (Provider).\n\nScope of Work: Provider agrees to deliver software development services as outlined in Exhibit A.\nPayment Terms: Client shall pay $10,000 per month, due on the 1st of each month.\nTerm: This agreement shall remain in effect for 12 months.\nTermination: Either party may terminate with 30 days written notice."
      },
      email: {
        filename: "email_followup.txt",
        text: "From: sarah.johnson@company.com\nTo: team@company.com\nSubject: Follow-up on Q2 Project Status\n\nHi Team,\n\nI wanted to follow up on our meeting last Tuesday regarding the Q2 project deliverables. Please send me your status updates by end of day Friday.\n\nKey deadlines:\n- Design mockups: May 15\n- Development complete: June 1\n- Testing: June 10\n\nBest regards,\nSarah Johnson\nProject Manager"
      }
    };

    function loadSample(type) {
      document.getElementById('filename').value = samples[type].filename;
      document.getElementById('doctext').value = samples[type].text;
    }

    async function classify() {
      const text = document.getElementById('doctext').value.trim();
      const filename = document.getElementById('filename').value.trim() || 'document.txt';

      if (!text) {
        showError("Please enter document text before analyzing.");
        return;
      }

      setLoading(true);
      hideAll();

      try {
        const response = await fetch(WEBHOOK_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ filename, text })
        });

        if (!response.ok) throw new Error(`Server error: ${response.status}`);

        const data = await response.json();
        showResult(data);
      } catch (err) {
        showError("Could not connect to the classification service. Please try again. (" + err.message + ")");
      } finally {
        setLoading(false);
      }
    }

    function showResult(data) {
      document.getElementById('rCategory').textContent = data.category || 'Unknown';
      document.getElementById('rConfidence').textContent = 'Confidence: ' + (data.confidence || '—');
      document.getElementById('rSummary').textContent = data.summary || '—';
      document.getElementById('rProcessed').textContent = data.processed_at ? new Date(data.processed_at).toLocaleString() : '—';

      const entitiesEl = document.getElementById('rEntities');
      entitiesEl.innerHTML = '';
      const entities = data.key_entities || [];
      if (entities.length === 0) {
        entitiesEl.innerHTML = '<span style="color:var(--text-muted);font-size:13px;">None found</span>';
      } else {
        entities.forEach(e => {
          const tag = document.createElement('span');
          tag.className = 'entity-tag';
          tag.textContent = e;
          entitiesEl.appendChild(tag);
        });
      }

      document.getElementById('resultCard').style.display = 'block';
    }

    function showError(msg) {
      const el = document.getElementById('errorCard');
      el.textContent = '⚠ ' + msg;
      el.style.display = 'block';
    }

    function hideAll() {
      document.getElementById('resultCard').style.display = 'none';
      document.getElementById('errorCard').style.display = 'none';
    }

    function setLoading(state) {
      document.getElementById('loading').style.display = state ? 'block' : 'none';
      document.getElementById('submitBtn').disabled = state;
    }
  </script>
</body>
</html>
